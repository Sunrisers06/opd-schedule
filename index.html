<!doctype html>


  
  
  Hospital OPD Schedule
  <style>
    body {
      background-color: #f4f6f9;
      font-family: Arial, sans-serif;
      color: #1e293b;
      margin: 0;
      padding: 20px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    header img {
      height: 60px;
      width: 60px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 24px;
      font-weight: bold;
      margin: 0;
      color: #222;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
      align-items: center;
    }
    select, input, button {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    input[type="text"] { flex: 1; min-width: 180px; }
    button {
      background-color: #0078d7;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover { background-color: #005fa3; }
    .card {
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th { background-color: #e7efff; position: sticky; top: 0; }
    tr:hover { background-color: #f9fafc; }
    .pill-day {
      background-color: #e0f2fe; color: #0369a1;
      padding: 2px 8px; border-radius: 12px;
      font-size: 12px; font-weight: bold;
    }
    .pill-spec {
      background-color: #f3f4f6; color: #374151;
      padding: 2px 8px; border-radius: 12px;
      font-size: 12px; font-weight: bold;
    }
    .badge-room {
      background-color: #fef3c7; color: #92400e;
      padding: 2px 8px; border-radius: 12px;
      font-size: 12px; font-weight: bold;
    }
    #loadingSpinner {
      border: 4px solid #e5e7eb;
      border-top: 4px solid #0078d7;
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    #noResults {
      padding: 10px; color: red; text-align: center;
    }
    .hidden { display: none; }
  </style>



  <header>
    <img id="logoImage" src="https://drive.google.com/thumbnail?id=1LxB4prb5ifCjptw89yB6ofwsjhVnBvTg" alt="Hospital Logo" />
    <h1>IOCL PRPC Hospital OPD Schedule</h1>
  </header>

  <div class="filters">
    <select id="filterDay"><option value="" />All Days</select>
    <select id="filterName"><option value="" />All Consultants</select>
    <select id="filterSpecialty"><option value="" />All Specialties</select>
    <input id="searchBox" type="text" placeholder="Search by name, specialty, or day..." />
    <button id="clearFiltersBtn">Clear</button>
  </div>

  <div id="loadingSpinner"></div>

  <div class="card hidden" id="tableContainer">
    <table id="opdTable">
      <thead>
        <tr>
          <th>Day</th>
          <th>OPD</th>
          <th>Timing</th>
          <th>Consultant</th>
          <th>Mobile</th>
          <th>Room</th>
          <th>Specialty</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div id="noResults" class="hidden">No entries match your filters.</div>
  </div>

  <!-- ✅ Use external JS hosted on GitHub or Cloudflare -->
 <script src="https://cdn.jsdelivr.net/gh/Sunrisers06/opd-schedule/opd.js"></script>


</!doctype>
