<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IOCL PRPC Hospital OPD Schedule</title>

  <style>
    :root {
      --bg: #f3f6fb;
      --surface: #ffffff;
      --primary: #0078d7;
      --primary-hover: #005fa3;
      --text: #1e293b;
      --muted: #64748b;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --radius: 14px;
    }

    body {
      background-color: var(--bg);
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      margin: 0;
      padding: 24px;
      line-height: 1.6;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 25px;
      background: linear-gradient(90deg, #0078d7, #0096ff);
      padding: 14px 20px;
      border-radius: var(--radius);
      color: white;
      box-shadow: var(--shadow);
    }

    header img {
      height: 60px;
      width: 60px;
      border-radius: 50%;
      border: 2px solid white;
      object-fit: cover;
      background-color: #fff;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.5px;
    }

    /* FILTERS */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
      background: var(--surface);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 12px 16px;
    }

    select, input, button {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      transition: all 0.2s ease;
    }

    select:focus, input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,120,215,0.15);
    }

    input[type="text"] { flex: 1; min-width: 200px; }

    button {
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0,120,215,0.3);
    }

    /* TABLE CARD */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: 0.3s ease;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: var(--radius);
      overflow: hidden;
    }

    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      background: #eaf2ff;
      color: #1e3a8a;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    tr:hover {
      background-color: #f9fbff;
      transition: background 0.2s ease;
    }

    /* TAG STYLES */
    .pill-day {
      background-color: #e0f2fe;
      color: #0369a1;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .pill-spec {
      background-color: #f3f4f6;
      color: #374151;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge-room {
      background-color: #fef3c7;
      color: #92400e;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    /* LOADING + EMPTY STATE */
    #loadingSpinner {
      border: 4px solid #e5e7eb;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      animation: spin 1s linear infinite;
      margin: 50px auto;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    #noResults {
      padding: 16px;
      color: #dc2626;
      text-align: center;
      font-weight: 500;
      background-color: #fee2e2;
      border-radius: var(--radius);
      margin: 10px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<header>
  <img id="logoImage" src="https://drive.google.com/thumbnail?id=1LxB4prb5ifCjptw89yB6ofwsjhVnBvTg" alt="SSB" />
  <h1>IOCL PRPC Hospital OPD Schedule</h1>
</header>

<div class="filters">
  <select id="filterDay">
    <option value="">All Days</option>
  </select>
  <select id="filterName">
    <option value="">All Consultants</option>
  </select>
  <select id="filterSpecialty">
    <option value="">All Specialties</option>
  </select>
  <input id="searchBox" type="text" placeholder="Search by name, specialty, or day..." />
  <button id="clearFiltersBtn">Clear</button>
</div>

<div id="loadingSpinner"></div>

<div class="card hidden" id="tableContainer">
  <table id="opdTable">
    <thead>
      <tr>
        <th>Day</th>
        <th>OPD</th>
        <th>Timing</th>
        <th>Consultant</th>
        <th>Mobile</th>
        <th>Room</th>
        <th>Specialty</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div id="noResults" class="hidden">No entries match your filters.</div>
</div>

<!-- External JS hosted on GitHub -->
<script src="https://cdn.jsdelivr.net/gh/Sunrisers06/opd-schedule/opd.js"></script>

</body>
</html>
